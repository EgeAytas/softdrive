<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>SoftDrive | Sorunsuz Yönetim Paneli</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #F8FAFC;
            --card: #FFFFFF;
            --primary: #A8DADC;
            --secondary: #457B9D;
            --accent: #1D3557;
            --admin-red: #E11D48;
            --soft-red: #FEE2E2;
            --text-red: #B91C1C;
            --soft-orange: #FFEDD5;
            --text-orange: #9A3412;
        }

        body { font-family: 'Poppins', sans-serif; background-color: var(--bg); color: var(--accent); margin: 0; }

        header {
            background: white; padding: 15px 8%; display: flex; justify-content: space-between;
            align-items: center; box-shadow: 0 4px 20px rgba(0,0,0,0.05); position: sticky; top: 0; z-index: 1000;
        }
        .logo { font-weight: 600; font-size: 26px; color: var(--secondary); cursor: pointer; }
        nav { display: flex; align-items: center; gap: 30px; }
        nav a { text-decoration: none; color: #64748b; font-weight: 500; cursor: pointer; }
        nav a.active { color: var(--secondary); font-weight: 600; border-bottom: 2px solid var(--secondary); }
        .nav-admin { color: var(--admin-red) !important; font-weight: 700 !important; display: none; }
        
        .btn-auth { background: var(--primary); color: white; border: none; padding: 10px 22px; border-radius: 12px; cursor: pointer; font-weight: 600; }
        .btn-logout { background: #FEE2E2; color: #B91C1C; border: none; padding: 8px 15px; border-radius: 10px; cursor: pointer; font-size: 12px; display: none; }

        .page-section { max-width: 1000px; margin: 30px auto; padding: 0 20px; display: none; }
        .page-section.active { display: block; }
        .card { background: white; border-radius: 30px; padding: 30px; box-shadow: 0 10px 40px rgba(0,0,0,0.03); margin-bottom: 25px; }

        .news-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .news-item { background: white; border-radius: 20px; overflow: hidden; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.02); }
        .news-img { width: 100%; height: 180px; object-fit: cover; background: #eee; }

        .admin-card { border: 2px solid var(--admin-red); background: #FFF1F2; }
        .admin-list-item { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 15px; background: white; border-radius: 15px; margin-bottom: 10px;
            border: 1px solid #FFE4E6;
        }
        .btn-sm { padding: 8px 15px; border-radius: 8px; border: none; cursor: pointer; font-size: 12px; font-weight: 600; }
        .btn-edit { background: var(--soft-orange); color: var(--text-orange); margin-right: 5px; }
        .btn-delete { background: var(--soft-red); color: var(--text-red); }

        input, textarea { width: 100%; padding: 12px; border-radius: 12px; border: 1.5px solid #E2E8F0; outline: none; margin-bottom: 12px; font-family: inherit; box-sizing: border-box; }
        .back-btn { background: none; border: 1.5px solid var(--secondary); color: var(--secondary); padding: 8px 18px; border-radius: 12px; cursor: pointer; margin-bottom: 15px; font-weight: 600; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); backdrop-filter: blur(8px); display: none; justify-content: center; align-items: center; z-index: 2000; }
    </style>
</head>
<body>

<header>
    <div class="logo" onclick="showPage('news')">SoftDrive.</div>
    <nav>
        <a onclick="showPage('news')" id="nav-news" class="active">Haberler</a>
        <a onclick="showPage('forum')" id="nav-forum">Forum</a>
        <a onclick="showPage('profile')" id="nav-profile">Profil</a>
        <a onclick="showPage('admin')" id="nav-admin" class="nav-admin">Yönetim</a>
        <button class="btn-auth" id="login-btn" onclick="openAuthModal()">Giriş Yap</button>
        <button class="btn-logout" id="logout-btn" onclick="handleLogout()">Çıkış</button>
    </nav>
</header>

<div id="news-page" class="page-section active">
    <div id="news-list-container">
        <div class="news-grid" id="news-grid"></div>
    </div>
    <div id="news-detail-view" style="display:none">
        <button class="back-btn" onclick="closeNewsDetail()">← Geri Dön</button>
        <div class="card">
            <img id="full-img" src="" style="width:100%; border-radius:20px; max-height:450px; object-fit:cover;">
            <h1 id="full-title"></h1>
            <p id="full-content" style="line-height:1.8; color:#4b5563; white-space: pre-wrap;"></p>
        </div>
    </div>
</div>

<div id="forum-page" class="page-section">
    <div class="card" style="background:#F0F9FF; border:2px dashed var(--primary);">
        <h3>💬 Soru Sor</h3>
        <input type="text" id="forum-q-title" placeholder="Soru başlığı...">
        <button class="btn-auth" onclick="addForumPost()">Yayınla</button>
    </div>
    <div id="forum-container"></div>
</div>

<div id="admin-page" class="page-section">
    <div class="card admin-card">
        <h2 style="color:var(--admin-red)">⚙️ Yönetim Paneli</h2>
        <div id="admin-news-form">
            <h3 id="adm-form-title">📰 Haber Ekle/Düzenle</h3>
            <input type="text" id="adm-news-title" placeholder="Haber Başlığı">
            <input type="text" id="adm-news-img" placeholder="Resim JPG yolu (araba.jpg)">
            <textarea id="adm-news-full" placeholder="Haber Detayı..." rows="5"></textarea>
            <button class="btn-auth" id="adm-news-btn" style="background:var(--admin-red); width:100%;" onclick="adminSaveNews()">Haberi Kaydet</button>
            <button class="btn-auth" id="adm-cancel-btn" style="background:#ccc; width:100%; margin-top:10px; display:none;" onclick="cancelNewsEdit()">Vazgeç</button>
        </div>
        <hr style="margin:30px 0;">
        <h3>📂 Haber Listesi</h3>
        <div id="adm-news-list"></div>
        <hr style="margin:30px 0;">
        <h3>💬 Forum Listesi</h3>
        <div id="adm-forum-list"></div>
    </div>
</div>

<div id="profile-page" class="page-section">
    <div class="card"><h2 id="prof-name">Misafir</h2><p id="prof-email">Lütfen giriş yapın.</p></div>
</div>

<div class="modal-overlay" id="authModal">
    <div class="card" style="width:350px; position:relative;">
        <span style="position:absolute; top:20px; right:25px; cursor:pointer;" onclick="closeAuthModal()">✕</span>
        <h2>Giriş Yap</h2>
        <input type="email" id="login-email" placeholder="admin@softdrive.com">
        <input type="password" id="login-pass" placeholder="admin123">
        <button class="btn-auth" style="width:100%" onclick="handleLogin()">Giriş</button>
    </div>
</div>

<script>
    // --- VERİ SİSTEMİ (TEMİZ BAŞLANGIÇ) ---
    const DB_KEY = 'SOFTDRIVE_CLEAN_DATA';
    
    // Uygulama her açıldığında LocalStorage'da veri yoksa varsayılanları yükle
    let db = JSON.parse(localStorage.getItem(DB_KEY)) || {
        news: [{id: 1, title:"Hoş Geldiniz", img:"https://images.unsplash.com/photo-1503376780353-7e6692767b70?w=800", full:"Admin paneli aktif!"}],
        forum: [{id: 1, title:"SoftDrive hakkında ne düşünüyorsunuz?", author:"Yönetici"}],
        user: null
    };

    let editingId = null;

    function save() { localStorage.setItem(DB_KEY, JSON.stringify(db)); }

    // --- UI GÜNCELLEME ---
    function updateUI() {
        const loginBtn = document.getElementById('login-btn');
        const logoutBtn = document.getElementById('logout-btn');
        const adminNav = document.getElementById('nav-admin');

        if(db.user) {
            loginBtn.style.display = 'none';
            logoutBtn.style.display = 'block';
            logoutBtn.innerText = `Çıkış (${db.user.name})`;
            adminNav.style.display = db.user.role === 'admin' ? 'block' : 'none';
            document.getElementById('prof-name').innerText = db.user.name;
            document.getElementById('prof-email').innerText = db.user.email;
        } else {
            loginBtn.style.display = 'block';
            logoutBtn.style.display = 'none';
            adminNav.style.display = 'none';
            document.getElementById('prof-name').innerText = "Misafir";
        }
    }

    function showPage(p) {
        document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('nav a').forEach(a => a.classList.remove('active'));
        document.getElementById(p+'-page').classList.add('active');
        if(document.getElementById('nav-'+p)) document.getElementById('nav-'+p).classList.add('active');
        
        if(p==='news') { closeNewsDetail(); renderNews(); }
        if(p==='forum') renderForum();
        if(p==='admin') renderAdminPanels();
        updateUI();
    }

    // --- HABERLER ---
    function renderNews() {
        const container = document.getElementById('news-grid');
        container.innerHTML = db.news.map(n => `
            <div class="news-item" onclick="showNewsDetail(${n.id})">
                <img src="${n.img}" class="news-img" onerror="this.src='https://via.placeholder.com/400x200'">
                <div style="padding:15px"><h3>${n.title}</h3></div>
            </div>
        `).join('');
    }

    function showNewsDetail(id) {
        const n = db.news.find(x => x.id == id);
        if(!n) return;
        document.getElementById('news-list-container').style.display = 'none';
        document.getElementById('news-detail-view').style.display = 'block';
        document.getElementById('full-img').src = n.img;
        document.getElementById('full-title').innerText = n.title;
        document.getElementById('full-content').innerText = n.full;
    }

    function closeNewsDetail() {
        document.getElementById('news-detail-view').style.display = 'none';
        document.getElementById('news-list-container').style.display = 'block';
    }

    // --- YÖNETİM İŞLEMLERİ (SİLME VE DÜZENLEME) ---
    function renderAdminPanels() {
        // Haber Listesini Bas
        document.getElementById('adm-news-list').innerHTML = db.news.map(n => `
            <div class="admin-list-item">
                <span>${n.title}</span>
                <div>
                    <button class="btn-sm btn-edit" onclick="startEditNews(${n.id})">Düzenle</button>
                    <button class="btn-sm btn-delete" onclick="deleteNews(${n.id})">SİL</button>
                </div>
            </div>
        `).join('');

        // Forum Listesini Bas
        document.getElementById('adm-forum-list').innerHTML = db.forum.map(f => `
            <div class="admin-list-item">
                <span>${f.title}</span>
                <button class="btn-sm btn-delete" onclick="deleteForum(${f.id})">SİL</button>
            </div>
        `).join('');
    }

    function deleteNews(id) {
        if(confirm("Bu haberi SİLECEĞİM. Onaylıyor musun?")) {
            db.news = db.news.filter(n => n.id != id); // Silme işlemi
            save(); // Hafızaya kaydet
            renderAdminPanels(); // Listeyi güncelle
            alert("Haber silindi.");
        }
    }

    function deleteForum(id) {
        if(confirm("Bu soruyu SİLECEĞİM. Onaylıyor musun?")) {
            db.forum = db.forum.filter(f => f.id != id); // Silme işlemi
            save(); // Hafızaya kaydet
            renderAdminPanels(); // Listeyi güncelle
            alert("Soru silindi.");
        }
    }

    function adminSaveNews() {
        const title = document.getElementById('adm-news-title').value;
        const img = document.getElementById('adm-news-img').value;
        const full = document.getElementById('adm-news-full').value;
        
        if(!title || !img) return alert("Başlık ve Resim alanı boş olamaz!");

        if(editingId !== null) {
            const index = db.news.findIndex(x => x.id == editingId);
            db.news[index] = { id: editingId, title, img, full };
            editingId = null;
            alert("Değişiklikler kaydedildi.");
        } else {
            db.news.unshift({ id: Date.now(), title, img, full });
            alert("Haber eklendi.");
        }
        
        save();
        cancelNewsEdit();
        renderAdminPanels();
    }

    function startEditNews(id) {
        const n = db.news.find(x => x.id == id);
        editingId = n.id;
        document.getElementById('adm-news-title').value = n.title;
        document.getElementById('adm-news-img').value = n.img;
        document.getElementById('adm-news-full').value = n.full;
        document.getElementById('adm-form-title').innerText = "📝 Haberi Güncelle";
        document.getElementById('adm-cancel-btn').style.display = "block";
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function cancelNewsEdit() {
        editingId = null;
        document.getElementById('adm-form-title').innerText = "📰 Haber Ekle/Düzenle";
        document.getElementById('adm-cancel-btn').style.display = "none";
        document.getElementById('adm-news-title').value = "";
        document.getElementById('adm-news-img').value = "";
        document.getElementById('adm-news-full').value = "";
    }

    // --- DİĞER ---
    function renderForum() {
        document.getElementById('forum-container').innerHTML = db.forum.map(f => `
            <div class="card"><strong>${f.title}</strong><br><small>Yazar: ${f.author}</small></div>
        `).join('');
    }

    function addForumPost() {
        if(!db.user) return openAuthModal();
        const t = document.getElementById('forum-q-title').value;
        if(!t) return;
        db.forum.unshift({ id: Date.now(), title: t, author: db.user.name });
        save(); renderForum(); document.getElementById('forum-q-title').value="";
    }

    function handleLogin() {
        const e = document.getElementById('login-email').value;
        const p = document.getElementById('login-pass').value;
        if(e === "admin@softdrive.com" && p === "admin123") {
            db.user = { name: "Yönetici", role: "admin", email: e };
            save(); updateUI(); closeAuthModal(); showPage('admin');
        } else if(e.includes('@')) {
            db.user = { name: e.split('@')[0], role: "user", email: e };
            save(); updateUI(); closeAuthModal(); showPage('news');
        } else alert("Geçersiz e-posta!");
    }

    function handleLogout() { db.user = null; save(); updateUI(); showPage('news'); }
    function openAuthModal() { document.getElementById('authModal').style.display = 'flex'; }
    function closeAuthModal() { document.getElementById('authModal').style.display = 'none'; }

    // BAŞLAT
    updateUI();
    renderNews();
</script>
</body>
</html>
